display_information:
  name: Tieu Nhi PR Reviewer
  description: Bot review PR (Azure DevOps) qua Claude Code
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: tieu-nhi
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read   # nhận sự kiện @mention bot
      - chat:write          # chat.postMessage (ack, kết quả)
      - files:write         # files.upload (đính kèm review dài)
      - reactions:write     # reactions.add (react tiến độ)
settings:
  event_subscriptions:
    request_url: https://jacinda-exchangeable-corban.ngrok-free.dev/slack/events
    bot_events:
      - app_mention
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
